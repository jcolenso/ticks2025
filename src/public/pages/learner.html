<div class="main learner">
  <div class="panel">
    <div class="section">
      <div class="row">
        <h1>{{ room.description || 'Room '+room.code }}</h1>
      </div>
      <div class="row-gap"></div>
      <div class="row">
        <input type="text" 
               pattern="[A-Za-z0-9\s.-]+" 
               title="Only letters, numbers, spaces, dots, and hyphens are allowed (max 20)"
               ng-model="learner.name" 
               placeholder="First name only" 
               maxlength="20" 
               autocomplete="off" 
               ng-change="nameChanged()">
      </div>
    </div>
    <div class="section-gap"></div>
    <div class="section" ng-class="{invisible: learner.name}">
      <div class="row">Only letters, numbers, spaces, dots, and hyphens</div>
      <div class="row">Maximum 20 characters</div>
    </div>
    <div class="section" ng-class="{invisible: !learner.name}">
      <div class="row">
        <div class="status">
          <status-symbol status="learner.status" />
        </div>
      </div>
      <div class="row-gap"></div>
      <div class="row">
        <div ng-if="failed" class="failed">
          Status update failed - try again
        </div>
        <div ng-if="!failed" class="time-message">
          {{(learner.status ? timeMessage : '') || '&nbsp;'}}
        </div>
      </div>
    </div>
    <div class="section-gap"></div>
    <div class="section" ng-class="{invisible: !learner.name}">
      <div class="row">
        <button ng-click="send('tick')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'tick'"></status-symbol><span>Tick</span>
        </button>
        <button ng-click="send('cross')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'cross'"></status-symbol><span>Cross</span>
        </button>
        <button ng-click="send('happy')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'happy'"></status-symbol><span>Happy</span>
        </button>
        <button ng-click="send('hand-up')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'hand-up'"></status-symbol><span>Hand</span>
        </button>
      </div>
      <div class="row-gap"></div>
      <div class="row">
        <button ng-click="send('A')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          A
        </button>
        <button ng-click="send('B')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          B
        </button>
        <button ng-click="send('C')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          C
        </button>
        <button ng-click="send('D')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          D
        </button>
        <button ng-click="send('E')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          E
        </button>
      </div>
      <div class="row-gap"></div>
      <div class="row">
        <button ng-click="send('smile')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'smile'"></status-symbol><span>Smile</span>
        </button>
        <button ng-click="send('coffee')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'coffee'"></status-symbol><span>Break</span>
        </button>
        <button ng-click="send('away')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          <status-symbol status="'away'"></status-symbol><span>Away</span>
        </button>
      </div>
    </div>
    <div class="section-gap"></div>
    <div class="section" ng-class="{invisible: !learner.name}">
      <div class="row">
        <button ng-click="send('')" 
        class="btn btn-lg btn-light rounded-pill border border-dark me-2 mb-1">
          Clear
        </button>
      </div>
    </div>
  </div>
</div>
