<form name="form">
  <div class="main intro">
    <div class="panel">
      <div class="section">
        <div class="row3">
          <h1>Ticks and Crosses</h1>
        </div>
      </div>
      <div class="section-gap"></div>
      <div class="section">
        <div class="row">
          <input type="text" 
                 placeholder="Room" 
                 ng-model="room.code" 
                 autocomplete="off" 
                 minlength="3" 
                 maxlength="25" 
                 onkeypress="return /[A-Za-z0-9 ]/i.test(event.key)" 
                 required>
        </div>
      </div>
      <div class="section-gap"></div>
      <div class="section">
        <div class="row">
          <button type="submit" ng-click="form.$valid && learner()" class="button1">I'm a learner</button>
          <span class="col-gap"></span>
          <button type="submit" ng-click="form.$valid && tutor()" class="button2">I'm the tutor</button>
        </div>
      </div>
      <div class="section-gap"></div>
      <div class="section">
        <div class="row1">
          <div>Learner - enter the room code given to you by your tutor.</div>
        </div>
      </div>
      <div class="section-gap"></div>
      <div class="section">
        <div class="row1">
          <div>Tutor - enter a room name. A room code will be allocated to you.</div>
        </div>
      </div>
    </div>
  </div>
</form>
